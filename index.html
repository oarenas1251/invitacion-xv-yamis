<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<title>XV Yamis</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}

.mobile {
    width: 100%;
    max-width: 420px;
    height: 100dvh;
    position: relative;
    background: url('fondo.png') no-repeat center top;
    background-size: 100% auto;
    background-color: black;
    overflow: hidden;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 50% 40%, rgba(143,191,166,0.15), transparent 60%),
        linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.35));
}

.particles {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.particles span {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 10s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
    50% { opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.content {
    position: absolute;
    bottom: 18%;
    transform: translateY(50%);
    width: 100%;
    text-align: center;
    padding: 0 20px;
    color: white;
    z-index: 2;
}

.countdown {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 25px;
}

.box {
    flex: 1;
    padding: 12px 8px;
    border-radius: 16px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 0 10px rgba(255,255,255,0.2);
}

.box span {
    display: block;
    font-size: 22px;
    font-weight: bold;
}

.label {
    font-size: 10px;
    opacity: 0.8;
}

.map-btn {
    position: relative;
    display: inline-block;
    padding: 14px 24px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    overflow: hidden;
    background: linear-gradient(135deg, #c8a84e, #a68a3a);
    box-shadow: 0 0 15px rgba(200,168,78,0.6);
    border: 2px solid #d4af37;
    animation: breath 2s infinite;
    transition: 0.3s;
}

.map-btn:active {
    transform: scale(0.95);
    background: linear-gradient(135deg, #a68a3a, #c8a84e);
}

.map-btn:hover {
    transform: scale(1.05);
}

.map-btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transform: scale(0);
    animation: ripple 0.6s ease-out;
    pointer-events: none;
}

@keyframes ripple { to { transform: scale(4); opacity: 0; } }

@keyframes breath {
    0%,100% { box-shadow: 0 0 10px rgba(200,168,78,0.5); }
    50% { box-shadow: 0 0 25px rgba(200,168,78,0.9); }
}

/* PANTALLA DE BIENVENIDA */
.welcome {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, #0a1a12, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    transition: opacity 1.5s ease, visibility 1.5s ease, transform 1.5s ease;
    overflow: hidden;
}

.welcome.hidden {
    opacity: 0;
    visibility: hidden;
    transform: scale(1.1);
}

.welcome-stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(143,191,166,0.6);
    border-radius: 50%;
    animation: welcomeFloat 8s linear infinite;
}

@keyframes welcomeFloat {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

.welcome h2 {
    color: white;
    font-size: 18px;
    letter-spacing: 3px;
    opacity: 0;
    margin-bottom: 45px;
    animation: trackIn 2s ease forwards;
}

@keyframes trackIn {
    0% { letter-spacing: 8px; opacity: 0; }
    100% { letter-spacing: 3px; opacity: 0.8; }
}

.welcome h1 {
    color: #8fbfa6;
    font-family: 'Great Vibes', cursive;
    font-size: 52px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(143,191,166,0.6);
    animation: fadeIn 2s ease 0.5s forwards, hologram 4s ease-in-out 2.5s infinite;
    opacity: 0;
}

@keyframes hologram {
    0%, 100% { text-shadow: 0 0 20px rgba(143,191,166,0.6); opacity: 1; }
    25% { text-shadow: 0 0 30px rgba(143,191,166,0.8), 0 0 60px rgba(143,191,166,0.3); opacity: 0.95; }
    50% { text-shadow: 0 0 10px rgba(143,191,166,0.4); opacity: 0.85; }
    52% { opacity: 1; }
    75% { text-shadow: 0 0 40px rgba(143,191,166,0.9), 0 0 80px rgba(143,191,166,0.2); }
}

.welcome-date {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 2s ease 0.8s forwards;
}

.open-btn {
    position: relative;
    padding: 16px 40px;
    border: none;
    border-radius: 30px;
    background: rgba(212,175,55,0.28);
    color: white;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    animation: fadeIn 2s ease 1s forwards;
    opacity: 0;
    transition: transform 0.3s, background 0.3s;
    z-index: 1;
}

.open-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 32px;
    padding: 2px;
    background: conic-gradient(from var(--angle), transparent 40%, #d4af37 50%, transparent 60%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    filter: drop-shadow(0 0 8px #d4af37);
    animation: spin 3s linear infinite;
}

@property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
}

@keyframes spin { to { --angle: 360deg; } }

.open-btn:hover {
    background: rgba(212,175,55,0.2);
    transform: scale(1.05);
}

.open-btn .flap {
    transform-origin: 9px 1px;
    animation: flapOpen 2s ease-in-out 3s infinite;
}

@keyframes flapOpen {
    0%, 100% { transform: rotateX(0); }
    50% { transform: rotateX(180deg); }
}

@keyframes fadeIn { to { opacity: 1; } }

@keyframes yodaFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(0, -12px); }
}

.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.8);
    animation: sparkle 3s ease-in-out forwards;
    pointer-events: none;
    z-index: 3;
}

@keyframes sparkle {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
}

.touch-star {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    border-radius: 50%;
    animation: touchBurst 1s ease-out forwards;
}

@keyframes touchBurst {
    0% { transform: scale(0) translate(0,0); opacity: 1; }
    60% { opacity: 0.9; }
    100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
}

/* BABY YODA + BADGE */
.yoda-wrapper {
    position: absolute;
    bottom: calc(18% + 110px);
    left: 0;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    gap: 8px;
    z-index: 10;
}

.yoda-container {
    position: relative;
    animation: yodaFloat 3s ease-in-out infinite;
}

.yoda-container .baby-yoda {
    width: 80px;
    cursor: pointer;
    display: block;
}

.yoda-badge {
    position: absolute;
    top: 0;
    left: 0;
    width: 20px;
    height: 20px;
    background: #e53935;
    color: white;
    font-size: 12px;
    font-weight: bold;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 11;
    pointer-events: none;
    box-shadow: 0 0 6px rgba(229,57,53,0.7);
}

/* SPEECH BUBBLE */
.speech-bubble {
    position: relative;
    display: flex;
    align-items: center;
    text-align: justify;
    gap: 10px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    padding: 12px;
    width: 75%;
    max-width: 75%;
    color: white;
    font-size: 11px;
    line-height: 1.5;
    opacity: 0;
    transform: scale(0.8) translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
}

.speech-bubble.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
}

.speech-bubble .chewbacca-img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(212,175,55,0.5);
    flex-shrink: 0;
}

.shooting-star {
    position: absolute;
    width: 100px;
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.9), transparent);
    border-radius: 1px;
    z-index: 1;
    pointer-events: none;
    transform: rotate(var(--angle));
    animation: shoot 0.8s linear forwards;
}

@keyframes shoot {
    0% { opacity: 1; transform: rotate(var(--angle)) translateX(0); }
    100% { opacity: 0; transform: rotate(var(--angle)) translateX(250px); }
}

/* ANIMACIONES DE ENTRADA */
.content .box,
.content .typewriter,
.content .map-btn {
    opacity: 0;
    transform: translateY(30px);
}

.content.reveal .box { animation: slideUp 0.6s ease forwards; }
.content.reveal .box:nth-child(1) { animation-delay: 0.2s; }
.content.reveal .box:nth-child(2) { animation-delay: 0.35s; }
.content.reveal .box:nth-child(3) { animation-delay: 0.5s; }
.content.reveal .box:nth-child(4) { animation-delay: 0.65s; }
.content.reveal .map-btn { animation: slideUp 0.6s ease 0.9s forwards; }
.content.reveal .typewriter { animation: slideUp 0.6s ease 1.1s forwards, typing 2.5s steps(20) 1.5s forwards, blink 0.7s step-end 1.5s infinite; }

@keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

.typewriter {
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid rgba(255,255,255,0.7);
    width: 0;
    margin: 20px auto 0;
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.9;
}

@keyframes typing { from { width: 0; } to { width: 100%; } }
@keyframes blink { 50% { border-color: transparent; } }

.typewriter.done {
    border-color: transparent !important;
    animation: none !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
    width: 100% !important;
}
</style>
</head>
<body>

<div class="welcome" id="welcome">
    <div class="welcome-stars" id="welcomeStars"></div>
    <h2>ESTÁS INVITADO(A)</h2>
    <h1>XV Yamis</h1>
    <p class="welcome-date">23 de Mayo · 3:00 PM</p>
    <button class="open-btn" id="openBtn">Abrir Invitación <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="white" stroke-width="1.5" style="vertical-align:middle;margin-left:6px"><rect x="1" y="1" width="16" height="12" rx="2"/><path class="flap" d="M1 1l8 6 8-6"/></svg></button>
</div>

<div class="mobile">
    <div class="overlay"></div>

    <div class="particles">
        <span style="left:5%;animation-delay:0s;width:2px;height:2px"></span>
        <span style="left:10%;animation-delay:0.5s"></span>
        <span style="left:18%;animation-delay:7s;width:2px;height:2px"></span>
        <span style="left:25%;animation-delay:3s;width:6px;height:6px"></span>
        <span style="left:30%;animation-delay:2s"></span>
        <span style="left:40%;animation-delay:5s;width:2px;height:2px"></span>
        <span style="left:50%;animation-delay:4s"></span>
        <span style="left:58%;animation-delay:8s;width:3px;height:3px"></span>
        <span style="left:65%;animation-delay:6s;width:6px;height:6px"></span>
        <span style="left:70%;animation-delay:1s"></span>
        <span style="left:78%;animation-delay:4.5s;width:2px;height:2px"></span>
        <span style="left:85%;animation-delay:9s;width:3px;height:3px"></span>
        <span style="left:90%;animation-delay:3s"></span>
        <span style="left:95%;animation-delay:6.5s;width:2px;height:2px"></span>
    </div>

    <div class="content">
        <div class="countdown">
            <div class="box"><span id="days">0</span><div class="label">DÍAS</div></div>
            <div class="box"><span id="hours">0</span><div class="label">HRS</div></div>
            <div class="box"><span id="minutes">0</span><div class="label">MIN</div></div>
            <div class="box"><span id="seconds">0</span><div class="label">SEG</div></div>
        </div>
        <a class="map-btn" href="https://www.google.com/maps?q=Salón+Luna+Luxxe+Coacalco" target="_blank">Ver ubicación</a>
        <div class="typewriter" id="typewriter">✦ Que la fuerza te acompañe ✦</div>
    </div>

    <div class="yoda-wrapper">
        <div class="speech-bubble" id="speechBubble">
            <img class="chewbacca-img" src="chewbacca.png" alt="Chewbacca">
            <span>
                ⚠️A nuestra quinceañera no le gusta <strong>Star Wars</strong>, pero el comité organizador (su papá) nos pagó por este diseño. 😅
            </span>
        </div>
        <div class="yoda-container">
            <span class="yoda-badge" id="yodaBadge">1</span>
            <img class="baby-yoda" src="baby-yoda.png" alt="Baby Yoda">
        </div>
    </div>
</div>

<audio id="music" loop><source src="musica.mp3" type="audio/mpeg"></audio>
<audio id="r2d2" preload="auto"><source src="r2d2.mp3" type="audio/mpeg"></audio>

<script>
const ws = document.getElementById("welcomeStars");
for (let i = 0; i < 70; i++) {
    const s = document.createElement("span");
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 8 + "s";
    s.style.width = s.style.height = (1 + Math.random() * 2) + "px";
    ws.appendChild(s);
}

const targetDate = new Date("May 23, 2026 15:00:00").getTime();
function updateCountdown() {
    const diff = targetDate - Date.now();
    document.getElementById("days").innerText = Math.floor(diff / 864e5);
    document.getElementById("hours").innerText = Math.floor((diff / 36e5) % 24);
    document.getElementById("minutes").innerText = Math.floor((diff / 6e4) % 60);
    document.getElementById("seconds").innerText = Math.floor((diff / 1e3) % 60);
}
setInterval(updateCountdown, 1000);

document.querySelector(".map-btn").addEventListener("click", function(e) {
    const r = document.createElement("span");
    r.className = "ripple";
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + "px";
    r.style.left = (e.clientX - rect.left - size/2) + "px";
    r.style.top = (e.clientY - rect.top - size/2) + "px";
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);
    const r2 = document.getElementById("r2d2");
    r2.currentTime = 0;
    r2.play();
});

document.getElementById("openBtn").addEventListener("click", () => {
    document.getElementById("welcome").classList.add("hidden");
    const music = document.getElementById("music");
    music.currentTime = 148;
    music.play();
    const mobile = document.querySelector(".mobile");

    setTimeout(() => document.querySelector(".content").classList.add("reveal"), 800);
    setTimeout(() => document.getElementById("typewriter").classList.add("done"), 4800);

    setInterval(() => {
        const s = document.createElement("span");
        s.className = "sparkle";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        mobile.appendChild(s);
        setTimeout(() => s.remove(), 3000);
    }, 800);

    const angles = [35, 145, 215, 325];
    setInterval(() => {
        const star = document.createElement("div");
        star.className = "shooting-star";
        star.style.top = Math.random() * 50 + "%";
        star.style.left = Math.random() * 70 + 10 + "%";
        star.style.setProperty("--angle", (angles[Math.floor(Math.random() * 4)] + Math.random() * 20 - 10) + "deg");
        mobile.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }, 4000);
});

// Baby Yoda: badge + speech bubble
let bubbleTimer;
document.querySelector(".baby-yoda").addEventListener("click", (e) => {
    e.stopPropagation();
    const b = document.getElementById("yodaBadge");
    if (b) { b.style.transition = "opacity 0.5s"; b.style.opacity = "0"; setTimeout(() => b.remove(), 500); }
    const bubble = document.getElementById("speechBubble");
    clearTimeout(bubbleTimer);
    bubble.classList.toggle("visible");
    if (bubble.classList.contains("visible")) {
        bubbleTimer = setTimeout(() => bubble.classList.remove("visible"), 7000);
    }
});

// Touch stars
document.querySelector(".mobile").addEventListener("click", (e) => {
    const colors = ["#fff", "#8fbfa6", "#d4af37", "#ffd700", "#ff6ec7", "#87ceeb"];
    for (let i = 0; i < 20; i++) {
        const s = document.createElement("div");
        s.className = "touch-star";
        const angle = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 70;
        const size = 4 + Math.random() * 8;
        s.style.width = size + "px";
        s.style.height = size + "px";
        s.style.left = e.clientX + "px";
        s.style.top = e.clientY + "px";
        s.style.background = colors[Math.floor(Math.random() * colors.length)];
        s.style.boxShadow = "0 0 8px " + s.style.background;
        s.style.setProperty("--tx", Math.cos(angle) * dist + "px");
        s.style.setProperty("--ty", Math.sin(angle) * dist + "px");
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1000);
    }
});
</script>
</body>
</html>
